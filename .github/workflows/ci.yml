name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions: {}

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        dockerfile:
          - context: "."
            file: "Dockerfile"
          - context: ".devcontainer"
            file: "Dockerfile.dev"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.context }}/${{ matrix.dockerfile.file }}
          platforms: ${{ matrix.platform }}
          build-args: VERSION=ci
          push: false
