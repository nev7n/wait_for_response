name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        dockerfile:
          - context: "."
            file: "Dockerfile"
          - context: ".devcontainer"
            file: "Dockerfile.dev"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.context }}/${{ matrix.dockerfile.file }}
          platforms: ${{ matrix.platform }}
          build-args: VERSION=ci
          push: false

  test:
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: VERSION=e2e
          tags: wait_for_response:e2e
          load: true
          push: false

      - run: docker image ls

      - name: replace image
        run: |
          yq e -i '.runs.image = "docker://wait_for_response:e2e"' action.yml

      - uses: ./
        with:
          url: https://www.github.com/
          responseCode: 200
